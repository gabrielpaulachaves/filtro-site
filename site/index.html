<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
       <h1 id="titulo">Tênis</h1> 
       <p>Selecione seu tênis para suas necessidades</p>
       <h2>Filtros</h2>
        <select name="Cor" id="filtrocor" class="filtro">
            <option data-name="">Preto</option>
            <option data-name="">Branco</option>
        </select>
       <select name="Tipo" id="filtrotipo" class="filtro">
            <option data-name="">corrida</option>
            <option data-name="">casual</option>
       </select>
    </header>
    <main>
        <div class="tenis corrida preto">corrida e preto</div>
        <div class="tenis casual branco">casual e branco</div>
        <div class="tenis corrida branco">corrida e branco</div>
        <div class="tenis corrida preto">corrida e preto</div>
        <div class="tenis casual branco">casual e branco</div>
        <div class="tenis casual preto">casual e preto</div>
        <div class="tenis corrida branco">corrida e branco</div>
        <div class="tenis casual preto">casual e preto</div>
        <div class="tenis casual branco">casual e branco</div>
        <div class="tenis corrida preto">corrida e preto</div>
    </main>
    <footer>
        <p>Developed by <a href="#">Gabriel</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
